<h2>Student Profile</h2>

<form 
  [formGroup]="profileForm"
  (ngSubmit)="onSubmit()">


  <label>
    Name:
  </label>

  <input 
    type="text"
    formControlName="name">


  <div *ngIf="profileForm.controls.name.touched 
              && profileForm.controls.name.invalid">

    Name is required

  </div>


  <br>


  <label>
    Email:
  </label>

  <input 
    type="email"
    formControlName="email">


  <div *ngIf="profileForm.controls.email.touched 
              && profileForm.controls.email.invalid">

    Enter a valid email

  </div>


  <br>


  <label>
    Semester:
  </label>

  <input 
    type="number"
    formControlName="semester">


  <div *ngIf="profileForm.controls.semester.touched 
              && profileForm.controls.semester.invalid">

    Semester must be between 1 and 8

  </div>


  <br>


  <button 
    type="submit"
    [disabled]="profileForm.invalid">

    Submit

  </button>


</form>
